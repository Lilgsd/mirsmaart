<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, height=1340, initial-scale=1.0">
    <title>Smart Mirror - 800x1340</title>
    <style>
        :root {
            --bg-color: black;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-green: #00E676;
            --accent-blue: #2196F3;
        }

        * {
            box-sizing: border-box;
        }

        /* ---------------------------------------------------- */
        /* PENGATURAN RESOLUSI LAYAR (800px x 1340px) */
        /* ---------------------------------------------------- */
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            margin: 0;
            padding: 35px;
            width: 800px;
            height: 1340px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            position: relative;
        }

        /* Container Utama Atas (Kiri: Widget, Tengah: Jam) */
        #main-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            z-index: 10;
        }

        /* Kolom Kiri (Jadwal Sholat, Kalender & Financial) */
        #left-column {
            display: flex;
            flex-direction: column;
            gap: 25px; /* Jarak antar widget diperlebar memanfaatkan tinggi 1340px */
            width: 250px; /* Disesuaikan agar tidak menabrak jam di tengah */
            z-index: 5;
        }

        /* 1. Jadwal Sholat */
        #prayer-container {
            width: 100%;
            background: transparent;
        }
        #prayer-countdown {
            font-size: 15px;
            font-weight: bold;
            color: var(--accent-green);
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .prayer-row {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            margin: 5px 0;
            color: var(--text-muted);
        }
        .prayer-row.next-prayer {
            color: var(--text-main);
            font-weight: bold;
            font-size: 17px;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        /* 2. Kalender Bulanan */
        #calendar-container {
            width: 100%;
            background: transparent; 
        }
        #calendar-header {
            font-size: 15px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 6px;
        }
        #calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 4px;
        }
        .cal-day-name {
            font-weight: bold;
            color: var(--text-muted);
            font-size: 12px;
            padding-bottom: 4px;
        }
        .cal-date {
            padding: 4px 0;
            color: var(--text-main); 
            border-radius: 4px;
            font-size: 13px;
        }
        .cal-date.today {
            background: var(--text-main);
            color: var(--bg-color);
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        .cal-date.empty {
            visibility: hidden;
        }

        /* 3. Financial Ticker */
        #fin-container {
            width: 100%;
            background: transparent;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }
        .fin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .fin-label {
            font-weight: bold;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        .fin-value {
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-main);
        }
        .fin-change {
            font-size: 11px;
            padding: 2px 5px;
            border-radius: 4px;
            margin-left: 4px;
        }
        .up { background: rgba(76, 175, 80, 0.2); color: #4CAF50; border: 1px solid #4CAF50; }
        .down { background: rgba(244, 67, 54, 0.2); color: #F44336; border: 1px solid #F44336; }

        /* Waktu & Salam (Tengah Atas - Presisi Anti-Tabrakan) */
        #top-container { 
            position: absolute;
            left: 50%;
            top: 35px;
            transform: translateX(-50%);
            display: flex; 
            flex-direction: column; 
            align-items: center;
            text-align: center;
            z-index: 1;
        }
        #greeting { 
            font-size: 22px; 
            color: #dddddd; 
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        #jam { 
            font-size: 88px; /* Ukuran optimal untuk lebar 800px */
            font-weight: bold; 
            line-height: 0.9; 
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Bagian Tengah (Kutipan / Motivation) */
        #quote { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 22px; 
            font-style: italic; 
            color: #888888; 
            text-align: center;
            padding: 0 12%;
            line-height: 1.6;
            z-index: 1;
        }

        /* ---------------------------------------------------- */
        /* AREA BAWAH (Musik, Cuaca, dan Berita) */
        /* ---------------------------------------------------- */
        
        /* Container Musik & Visualizer (Kiri Bawah) */
        #music-container { 
            position: absolute;
            left: 35px;
            bottom: 85px; /* Tepat di atas running news */
            width: 250px; /* Sejajar dengan kolom kiri */
            z-index: 5;
            display: flex;
            flex-direction: column;
        }
        #music-container iframe {
            filter: grayscale(100%) brightness(1.3) opacity(0.7);
            mix-blend-mode: screen; 
            border-radius: 12px;
        }
        #visualizer {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 18px;
            margin-bottom: 8px;
            margin-left: 4px;
        }
        .bar {
            width: 3px;
            background: #1db954; 
            border-radius: 2px;
            animation: bounce 0.8s infinite ease-in-out alternate;
        }
        .bar:nth-child(1) { height: 6px; animation-delay: 0.1s; }
        .bar:nth-child(2) { height: 14px; animation-delay: 0.4s; }
        .bar:nth-child(3) { height: 10px; animation-delay: 0.2s; }
        .bar:nth-child(4) { height: 16px; animation-delay: 0.6s; }
        .bar:nth-child(5) { height: 8px; animation-delay: 0.3s; }
        
        @keyframes bounce {
            0% { transform: scaleY(0.3); opacity: 0.5; }
            100% { transform: scaleY(1.2); opacity: 1; }
        }

        /* Bagian Bawah Kanan (Cuaca, AQI, Tanggal & Bulan) */
        #bottom-right-container { 
            position: absolute;
            right: 35px;
            bottom: 85px;
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            text-align: right; 
            z-index: 5;
        }
        #weather { 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 12px; 
        }
        #weather-icon { width: 55px; height: 55px; }
        #weather-info { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.1; }
        #temp { font-size: 32px; font-weight: bold; }
        #desc { font-size: 14px; color: var(--text-muted); text-transform: capitalize; margin-top: 4px; }
        
        #aqi-badge {
            font-size: 11px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 12px;
            margin-top: 8px;
            margin-bottom: 10px;
            background: #4CAF50;
            color: black;
            display: inline-block;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.4);
        }

        #date-moon-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            color: #cccccc;
        }
        #moon-phase { font-size: 20px; }

        /* Running News Ticker (Paling Bawah) */
        #news-ticker {
            width: 100%;
            background: transparent;
            padding-top: 15px;
            font-size: 16px;
            color: #dddddd;
            display: flex;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 10;
        }
        #news-label {
            font-weight: bold;
            color: var(--accent-blue);
            margin-right: 15px;
            white-space: nowrap;
            letter-spacing: 1px;
            font-size: 14px;
        }
        #news-content {
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Grid Atas -->
    <div id="main-grid">
        <!-- Kolom Kiri -->
        <div id="left-column">
            <div id="prayer-container">
                <div id="prayer-countdown">Loading jadwal sholat...</div>
                <div id="prayer-list"></div>
            </div>
            
            <div id="calendar-container">
                <div id="calendar-header">MEMUAT KALENDER...</div>
                <div id="calendar-grid"></div>
            </div>

            <div id="fin-container">
                <div class="fin-row">
                    <span class="fin-label">₿ BTC/USD</span>
                    <div>
                        <span class="fin-value" id="btc-rate">Loading...</span>
                        <span class="fin-change" id="btc-change">0.0%</span>
                    </div>
                </div>
                <div class="fin-row">
                    <span class="fin-label">💵 USD/IDR</span>
                    <span class="fin-value" id="usd-rate">Loading...</span>
                </div>
                <div class="fin-row">
                    <span class="fin-label">🪙 EMAS/GR</span>
                    <div>
                        <span class="fin-value" id="gold-rate">Loading...</span>
                        <span class="fin-change" id="gold-change">0.0%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Waktu & Salam -->
        <div id="top-container">
            <div id="greeting">Halo!</div>
            <div id="jam">00:00</div>
        </div>
    </div>

    <!-- Area Kutipan Tengah -->
    <div id="quote">"Loading motivasi..."</div>

    <!-- Area Kiri Bawah: Musik & Audio Visualizer -->
    <div id="music-container">
        <div id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <iframe data-testid="embed-iframe" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWWQRwui0ExPn?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <!-- Area Kanan Bawah: Cuaca, AQI, Tanggal & Bulan -->
    <div id="bottom-right-container">
        <div id="weather">
            <div id="weather-info">
                <span id="temp">--°C</span>
                <span id="desc">Loading...</span>
            </div>
            <img id="weather-icon" src="" alt="">
        </div>

        <div id="aqi-badge">AQI: Loading...</div>
        
        <div id="date-moon-container">
            <span id="tanggal">Loading...</span>
            <span id="moon-phase" title="Fase Bulan">🌓</span>
        </div>
    </div>

    <!-- Running News Ticker -->
    <div id="news-ticker">
        <span id="news-label">NYT TOP STORIES</span>
        <span id="news-content">Loading berita terbaru...</span>
    </div>

    <script>
        // 1. Fungsi Waktu & Fase Bulan
        function updateJam() {
            const sekarang = new Date();
            const jam = sekarang.getHours();
            let salam = (jam >= 4 && jam < 11) ? "Selamat Pagi" : 
                        (jam >= 11 && jam < 15) ? "Selamat Siang" : 
                        (jam >= 15 && jam < 18) ? "Selamat Sore" : "Selamat Malam";
            
            document.getElementById('greeting').innerText = salam;
            document.getElementById('jam').innerText = sekarang.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('tanggal').innerText = sekarang.toLocaleDateString('id-ID', {weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'});
            
            updateMoonPhase(sekarang);
        }

        function updateMoonPhase(date) {
            let year = date.getFullYear();
            let month = date.getMonth() + 1;
            let day = date.getDate();
            if (month < 3) { year--; month += 12; }
            let c = 365.25 * year;
            let e = 30.6 * month;
            let jd = c + e + day - 694039.09; 
            let phase = jd / 29.5305882;
            phase -= Math.floor(phase);
            phase = Math.round(phase * 8);
            if (phase >= 8) phase = 0;
            
            const moonIcons = ["🌑", "🌒", "🌓", "🌔", "🌕", "🌖", "🌗", "🌘"];
            document.getElementById('moon-phase').innerText = moonIcons[phase];
        }

        setInterval(updateJam, 1000);
        updateJam();

        // 2. Fitur Kalender Bulanan Minimalis
        function renderCalendar() {
            const sekarang = new Date();
            const tahun = sekarang.getFullYear();
            const bulan = sekarang.getMonth();
            const tanggalHariIni = sekarang.getDate();

            const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            const namaHari = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];

            document.getElementById('calendar-header').innerText = `${namaBulan[bulan]} ${tahun}`;

            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            namaHari.forEach(hari => {
                const el = document.createElement('div');
                el.className = 'cal-day-name';
                el.innerText = hari;
                grid.appendChild(el);
            });

            const hariPertama = new Date(tahun, bulan, 1).getDay();
            const jumlahHari = new Date(tahun, bulan + 1, 0).getDate();

            for (let i = 0; i < hariPertama; i++) {
                const el = document.createElement('div');
                el.className = 'cal-date empty';
                grid.appendChild(el);
            }

            for (let i = 1; i <= jumlahHari; i++) {
                const el = document.createElement('div');
                el.className = 'cal-date';
                if (i === tanggalHariIni) el.classList.add('today'); 
                el.innerText = i;
                grid.appendChild(el);
            }
        }
        renderCalendar();
        setInterval(renderCalendar, 3600000); 

        // 3. Financial Ticker (BTC/USD, USD/IDR, & Emas per Gram/IDR)
        const API_KEY_EXCHANGE = '2b44022bc132e3e50f450ad3';
        function updateFinancials() {
            fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,pax-gold&vs_currencies=usd,idr&include_24hr_change=true')
                .then(res => res.json())
                .then(data => {
                    if(data && data['bitcoin']) {
                        const btcUsd = data['bitcoin'].usd;
                        const btcChange = data['bitcoin'].usd_24h_change;
                        document.getElementById('btc-rate').innerText = '$' + btcUsd.toLocaleString('en-US');
                        
                        const changeEl = document.getElementById('btc-change');
                        const isPositive = btcChange >= 0;
                        changeEl.innerText = (isPositive ? '+' : '') + btcChange.toFixed(2) + '%';
                        changeEl.className = 'fin-change ' + (isPositive ? 'up' : 'down');
                    }

                    if(data && data['pax-gold']) {
                        const emasPerTroyOunce = data['pax-gold'].idr;
                        const goldChange = data['pax-gold'].idr_24h_change;
                        const emasPerGram = emasPerTroyOunce / 31.1035;

                        document.getElementById('gold-rate').innerText = 'Rp ' + Math.round(emasPerGram).toLocaleString('id-ID');
                        const changeEl = document.getElementById('gold-change');
                        const isPositive = goldChange >= 0;
                        changeEl.innerText = (isPositive ? '+' : '') + goldChange.toFixed(2) + '%';
                        changeEl.className = 'fin-change ' + (isPositive ? 'up' : 'down');
                    }
                })
                .catch(err => console.error("Gagal memuat Kripto & Emas:", err));

            fetch(`https://v6.exchangerate-api.com/v6/${API_KEY_EXCHANGE}/latest/USD`)
                .then(res => res.json())
                .then(data => {
                    if(data.conversion_rates && data.conversion_rates.IDR) {
                        document.getElementById('usd-rate').innerText = 'Rp ' + Math.round(data.conversion_rates.IDR).toLocaleString('id-ID');
                    }
                })
                .catch(err => {
                    console.error("Gagal USD/IDR:", err);
                    document.getElementById('usd-rate').innerText = "Error";
                });
        }
        
        updateFinancials(); 
        setInterval(updateFinancials, 300000); 

        // 4. Fungsi Cuaca & AQI
        const apiKey = '41841c0f862f7d88fbc87719b4c4db02';
        const city = 'Jakarta'; 
        function updateCuaca() {
            fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`)
                .then(response => response.json())
                .then(data => {
                    if(data.main && data.weather) {
                        document.getElementById('temp').innerText = Math.round(data.main.temp) + '°C';
                        document.getElementById('desc').innerText = data.weather[0].description;
                        document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
                        updateAQI(data.coord.lat, data.coord.lon);
                    }
                })
                .catch(err => console.error("Gagal mengambil data cuaca:", err));
        }

        function updateAQI(lat, lon) {
            fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`)
                .then(res => res.json())
                .then(data => {
                    if(data.current && data.current.us_aqi !== undefined) {
                        const aqi = data.current.us_aqi;
                        const badge = document.getElementById('aqi-badge');
                        
                        if(aqi <= 50) {
                            badge.innerText = `AQI: ${aqi} (Baik)`;
                            badge.style.background = '#4CAF50'; badge.style.color = 'black';
                        } else if(aqi <= 100) {
                            badge.innerText = `AQI: ${aqi} (Sedang)`;
                            badge.style.background = '#FFEB3B'; badge.style.color = 'black';
                        } else if(aqi <= 150) {
                            badge.innerText = `AQI: ${aqi} (Sensitif)`;
                            badge.style.background = '#FF9800'; badge.style.color = 'black';
                        } else {
                            badge.innerText = `AQI: ${aqi} (Buruk)`;
                            badge.style.background = '#F44336'; badge.style.color = 'white';
                        }
                    }
                })
                .catch(err => console.error("Gagal memuat AQI:", err));
        }

        updateCuaca();
        setInterval(updateCuaca, 1800000);

        // 5. Fungsi Kutipan
        const quotes = [
            "Jadilah versi terbaik dari dirimu sendiri.", 
            "Hari ini adalah kesempatan baru yang luar biasa.", 
            "Mimpi besar selalu dimulai dari langkah kecil."
        ];
        document.getElementById('quote').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;

        // 6. Fitur Jadwal Sholat & Hitung Mundur
        let jadwalSholatHariIni = {};
        function updateJadwalSholat() {
            fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=Indonesia&method=11`)
                .then(response => response.json())
                .then(data => {
                    if(data.data && data.data.timings) {
                        const t = data.data.timings;
                        jadwalSholatHariIni = {
                            "Subuh": t.Fajr, "Dhuha": t.Sunrise, "Dzuhur": t.Dhuhr,
                            "Ashar": t.Asr, "Maghrib": t.Maghrib, "Isya": t.Isha
                        };
                        renderJadwalSholat();
                    }
                })
                .catch(err => console.error("Gagal memuat jadwal sholat:", err));
        }

        function renderJadwalSholat() {
            const listEl = document.getElementById('prayer-list');
            listEl.innerHTML = '';
            
            const sekarang = new Date();
            const waktuSekarangMenit = sekarang.getHours() * 60 + sekarang.getMinutes();
            let nextPrayerName = "-";
            let selisihMenitTerkecil = Infinity;

            for (let [nama, waktu] of Object.entries(jadwalSholatHariIni)) {
                const [jam, menit] = waktu.split(':').map(Number);
                const waktuSholatMenit = jam * 60 + menit;
                
                if (waktuSholatMenit > waktuSekarangMenit && (waktuSholatMenit - waktuSekarangMenit) < selisihMenitTerkecil) {
                    selisihMenitTerkecil = waktuSholatMenit - waktuSekarangMenit;
                    nextPrayerName = nama;
                }

                const row = document.createElement('div');
                row.className = 'prayer-row';
                row.innerHTML = `<span>${nama}</span><span>${waktu}</span>`;
                listEl.appendChild(row);
            }

            const rows = listEl.getElementsByClassName('prayer-row');
            for(let row of rows) {
                if(row.innerText.includes(nextPrayerName)) row.classList.add('next-prayer');
            }

            if (nextPrayerName !== "-") {
                const jamSisa = Math.floor(selisihMenitTerkecil / 60);
                const menitSisa = selisihMenitTerkecil % 60;
                let teksCountdown = `Menuju ${nextPrayerName}: `;
                if(jamSisa > 0) teksCountdown += `${jamSisa}j `;
                teksCountdown += `${menitSisa}m lagi`;
                document.getElementById('prayer-countdown').innerText = teksCountdown;
            } else {
                document.getElementById('prayer-countdown').innerText = "Waktu Isya telah lewat";
            }
        }

        updateJadwalSholat();
        setInterval(updateJadwalSholat, 3600000); 
        setInterval(renderJadwalSholat, 60000); 

        // 7. Fitur Berita Terkini
        let daftarBerita = [
            "Selamat datang di Smart Mirror. Harap tunggu, sedang memuat berita terbaru hari ini...",
            "Tips: Tetap semangat dan jaga kesehatan setiap hari!"
        ];
        let indeksBerita = 0;

        function updateBeritaAPI() {
            const rssUrl = encodeURIComponent('https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml');
            fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`)
                .then(response => response.json())
                .then(data => {
                    if(data.items && data.items.length > 0) {
                        daftarBerita = data.items.map(item => item.title);
                    }
                })
                .catch(err => console.error("Gagal memuat berita:", err));
        }

        function rotasiBerita() {
            const el = document.getElementById('news-content');
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerText = daftarBerita[indeksBerita];
                el.style.opacity = 1;
                el.style.transition = "opacity 0.5s ease-in-out";
                indeksBerita = (indeksBerita + 1) % daftarBerita.length;
            }, 500);
        }

        updateBeritaAPI();
        rotasiBerita();
        setInterval(updateBeritaAPI, 1800000); 
        setInterval(rotasiBerita, 15000); // Dipercepat menjadi 15 detik agar rotasi lebih dinamis
    </script>
</body>
</html>
